# Tiny Tapeout project information
project:
  title:        "AER Reflex Chip - MCP2515 CAN gateway"
  author:       "khu-haeun"
  discord:      ""
  description:  "Robot-arm reflex core: relays joint commands to CAN via an MCP2515, blocks the stream on a danger trigger and injects a reflex pose. Tuning values (recoil/speed/debounce) hardcoded; rules/threshold/flinch programmable."
  language:     "Verilog"
  clock_hz:     20000000
  tiles: "3x2"
  top_module:  "tt_um_reflex_s4"
  source_files:
    - "tt_um_reflex_s4.v"
    - "reflex_core_c.v"
    - "reflex_pose_gen.v"
    - "reflex_tx_src.v"
    - "pose_status_decode.v"
    - "spi_slave_full.v"
    - "spi_master_mcp_v2.v"
    - "mcp_arb4.v"
    - "mcp_init.v"
    - "mcp_probe.v"
    - "mcp_rx_recv.v"
    - "mcp_tx_mux.v"
    - "mcp_tx_send.v"
pinout:
  ui[0]: "dip estop trigger"
  ui[1]: "danger1 soft trigger"
  ui[2]: "mcp_int"
  ui[3]: "mcp_miso"
  ui[4]: ""
  ui[5]: ""
  ui[6]: ""
  ui[7]: "arm_enable"
  uo[0]: "valid"
  uo[1]: "fire"
  uo[2]: "action_id0"
  uo[3]: "action_id1"
  uo[4]: "action_id2"
  uo[5]: "reflex_active gate"
  uo[6]: "mcp_rst"
  uo[7]: "heartbeat"
  uio[0]: "SPI slave SCLK in"
  uio[1]: "SPI slave MOSI in"
  uio[2]: "SPI slave CSn in"
  uio[3]: "SPI slave MISO out"
  uio[4]: "SPI master SCLK out"
  uio[5]: "SPI master MOSI out"
  uio[6]: "SPI master CSn out"
  uio[7]: ""
yaml_version: 6
